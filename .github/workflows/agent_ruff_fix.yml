name: AI Agent — Ruff Auto-fix

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ruff-fix:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff --fix
        run: ruff check --fix backend/ tests/ || true

      - name: Commit and push fixes
        id: commit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FIXED=$(git diff --name-only)
          if [ -z "$FIXED" ]; then
            echo "fixed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "$FIXED" > /tmp/fixed_files.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/ tests/
          git commit -m "style(agent): auto-fix ruff warnings"
          git push
          echo "fixed=true" >> "$GITHUB_OUTPUT"

      - name: Post comment
        if: steps.commit.outputs.fixed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FILES=$(cat /tmp/fixed_files.txt | sed 's/^/- /')
          gh pr comment ${{ github.event.pull_request.number }} --body "$(printf '## AI Agent — Ruff Auto-fix\n\nFixed linting issues in:\n%s\n\n---\n*Fixed by ruff --fix · run again by pushing a new commit*' "$FILES")"
